<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inul StarZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-orange-500 min-h-screen relative">

  <nav class="bg-pink-500 text-white p-4 flex justify-between items-center fixed top-0 left-0 w-full z-50 shadow-md">
    <div class="flex items-center gap-2">
      <img src="logo.png" alt="Logo Vizta" class="h-10 w-auto"/>
    </div>
    <button id="menuBtn" class="text-white text-2xl focus:outline-none">☰</button>
  </nav>

  <div id="dashboard" class="fixed top-0 right-0 w-64 h-full bg-pink-600 text-white shadow-lg transform translate-x-full transition-transform duration-300 z-50">
    <div class="p-4 flex justify-between items-center border-b border-pink-400">
      <h2 class="text-xl font-bold">Dashboard</h2>
      <button id="closeBtn" class="text-xl">✖</button>
    </div>
    <ul class="mt-4 space-y-2">
        <li>
            <div>
                <a href="home.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">HOME</a>
            </div>
        </li>
        <li>
            <div>
                <a class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">NEWS</a>
            </div>
        </li>
        <li>
            <div>
              <a href="outlet.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">OUTLET</a>
            </div>
        </li>
        <li>
            <div>
              <a href="system.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">SYSTEM</a>
            </div>
        </li>
        <li>
            <div>
              <a href="event.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">EVENT</a>
            </div>
        </li>
        <li>
            <div>
              <a href="promo.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">PROMO</a>
            </div>
        </li>
        <li>
            <div>
              <a href="faq.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">FAQ</a>
            </div>
        </li>
        <li>
            <div>
              <a href="about.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">ABOUT US</a>
            </div>
        </li>
        <li>
          <div>
            <a href="contact.html" class="block px-4 py-2 hover:bg-pink-700 submenu-toggle">CONTACT</a>
          </div>
      </li>
    </ul>
  </div>

  <section class="w-full min-h-screen bg-cover bg-center" style="background-image: url('hed.jpeg');">
    <div class="w-full min-h-screen bg-blue-900 bg-opacity-50 flex items-center justify-center">
        <div class="text-center text-white">
            <h2 class="text-4xl font-bold mb-4">Inul StarZ</h2>
        </div>
    </div>
  </section>

  <!--<div class="relative">
    <img src="hed.jpeg" alt="KTV Room" class="w-full h-full object-cover" />
    <h1 class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-white text-3xl font-bold">BLOG POST</h1>
  </div>-->

  <div class="flex justify-center items-center mt-20 px-4">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-xl w-full text-center">
      <h1 class="text-3xl font-bold text-gray-800 mb-4">Nothing Found</h1>
      <p class="text-gray-600 mb-6">It seems we can’t find what you’re looking for. Perhaps searching can help.</p>
      <form class="flex justify-center">
        <input type="text" placeholder="Search …" class="p-2 rounded-l-md border border-gray-300 focus:outline-none w-2/3"/>
        <button type="submit" class="bg-orange-500 text-white px-4 rounded-r-md hover:bg-pink-600">Search</button>
      </form>
    </div>
  </div>

  <footer class="fixed bottom-4 right-4 z-50">
    <a href="contact.html" class="bg-green-500 p-3 rounded-full shadow-lg flex items-center justify-center w-14 h-14">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="w-8 h-8" />
    </a>
  </footer>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const closeBtn = document.getElementById("closeBtn");
    const dashboard = document.getElementById("dashboard");

    menuBtn.addEventListener("click", () => {
      dashboard.classList.remove("translate-x-full");
    });

    closeBtn.addEventListener("click", () => {
      dashboard.classList.add("translate-x-full");
    });

    const submenuToggles = document.querySelectorAll(".submenu-toggle");
    submenuToggles.forEach(toggle => {
      toggle.addEventListener("click", () => {
        const submenu = toggle.nextElementSibling;
        submenu.classList.toggle("hidden");
      });
    });
  </script>
</body>
</html>
